name: CI

on:
  push:
    branches: ["feat/**"]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     challenge_user
          POSTGRES_PASSWORD: challenge_pass
          POSTGRES_DB:       db_gestao_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U challenge_user -d db_gestao_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV:     test
      DATABASE_URL: postgresql://challenge_user:challenge_pass@localhost:5432/db_gestao_test?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Compilar TypeScript
        run: npm run build

      - name: Preparar banco de testes
        env:
          PGPASSWORD: challenge_pass
        run: |
          psql -h localhost -U challenge_user -d db_gestao_test -f tests/fixtures/schema.sql
          psql -h localhost -U challenge_user -d db_gestao_test -f tests/fixtures/data.sql

      - name: Testes unitários
        run: npm run test:unit

      - name: Testes de integração
        run: npm run test:integration

      - name: Testes de segurança
        run: npm run test:security

      - name: Testes E2E
        run: npm run test:e2e

      - name: Upload de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Notificar falha
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ CI falhou — ${{ github.repository }} (${{ github.ref_name }})"
          to: ${{ secrets.MAIL_USERNAME }}
          from: SQL Challenge CI <${{ secrets.MAIL_USERNAME }}>
          body: |
            O pipeline de CI (backend) falhou.

            Repositório : ${{ github.repository }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}
            Autor       : ${{ github.actor }}

            Veja os detalhes em:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
