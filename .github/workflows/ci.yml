name: CI

on:
  push:
    branches: [dev, "feature/**"]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: challenge_user
          POSTGRES_PASSWORD: challenge_pass
          POSTGRES_DB: db_gestao_challenge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U challenge_user -d db_gestao_challenge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://challenge_user:challenge_pass@localhost:5432/db_gestao_challenge?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Setup integration test database
        env:
          PGPASSWORD: challenge_pass
        run: |
          psql -h localhost -U challenge_user -d db_gestao_challenge -f tests/fixtures/schema.sql
          psql -h localhost -U challenge_user -d db_gestao_challenge -f tests/fixtures/data.sql

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Run security tests
        run: npm run test:security

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Swagger docs URL
        if: success()
        run: |
          echo "📄 Swagger disponível em:"
          echo "   Local  : http://localhost:3000/api/docs"
          echo "   VPS    : https://apihub-macedo.duckdns.org/api/docs"

      - name: Notificar falha por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ CI falhou — ${{ github.repository }} (${{ github.ref_name }})"
          to: ${{ secrets.MAIL_USERNAME }}
          from: SQL Challenge CI <${{ secrets.MAIL_USERNAME }}>
          body: |
            O pipeline de CI falhou.

            Repositório : ${{ github.repository }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}
            Autor       : ${{ github.actor }}

            Veja os detalhes em:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
