name: CD

# ┌─ dev  ──► staging  (porta 3010, DB db_gestao_staging)
# └─ main ──► production (porta 3000, DB db_gestao)

on:
  push:
    branches: [main, dev]

jobs:
  # ── 1. Testes (obrigatório antes do deploy) ──────────────────
  test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     challenge_user
          POSTGRES_PASSWORD: challenge_pass
          POSTGRES_DB:       db_gestao_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U challenge_user -d db_gestao_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV:     test
      DATABASE_URL: postgresql://challenge_user:challenge_pass@localhost:5432/db_gestao_test?sslmode=disable

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Preparar banco de testes
        env:
          PGPASSWORD: challenge_pass
        run: |
          psql -h localhost -U challenge_user -d db_gestao_test -f tests/fixtures/schema.sql
          psql -h localhost -U challenge_user -d db_gestao_test -f tests/fixtures/data.sql
      - run: npm run test:unit
      - run: npm run test:integration
      - run: npm run test:security
      - run: npm run test:e2e

  # ── 2. Deploy ─────────────────────────────────────────────────
  deploy:
    name: Deploy → ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Resolver ambiente
        id: env
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "DEPLOY_ENV=production"              >> $GITHUB_OUTPUT
            echo "IMAGE_TAG=latest"                   >> $GITHUB_OUTPUT
            echo "COMPOSE_FILE=docker-compose.yml"    >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_ENV=staging"                         >> $GITHUB_OUTPUT
            echo "IMAGE_TAG=staging"                          >> $GITHUB_OUTPUT
            echo "COMPOSE_FILE=docker-compose.staging.yml"    >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          port:     ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            DEPLOY_ENV="${{ steps.env.outputs.DEPLOY_ENV }}"
            IMAGE_TAG="${{ steps.env.outputs.IMAGE_TAG }}"
            COMPOSE_FILE="${{ steps.env.outputs.COMPOSE_FILE }}"
            DEPLOY_DIR="/opt/apps/sql-challenge/backend"

            echo "=== Deploy: env=$DEPLOY_ENV tag=$IMAGE_TAG ==="
            cd "$DEPLOY_DIR"

            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            ENV_FILE=".env.${DEPLOY_ENV}"
            [ -f "$ENV_FILE" ] || { echo "❌ $ENV_FILE não encontrado na VPS"; exit 1; }

            IMAGE_TAG=$IMAGE_TAG docker compose -f "$COMPOSE_FILE" up -d --build
            docker image prune -f

            echo "✅ Backend $DEPLOY_ENV deployado com sucesso"

      - name: Notificar falha
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ CD ${{ steps.env.outputs.DEPLOY_ENV }} falhou — ${{ github.repository }}"
          to: ${{ secrets.MAIL_USERNAME }}
          from: SQL Challenge CD <${{ secrets.MAIL_USERNAME }}>
          body: |
            O pipeline de CD (backend) falhou.

            Ambiente    : ${{ steps.env.outputs.DEPLOY_ENV }}
            Repositório : ${{ github.repository }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}
            Autor       : ${{ github.actor }}

            Veja os detalhes em:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
