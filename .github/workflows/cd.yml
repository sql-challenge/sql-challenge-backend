name: CD

# ┌─ dev  ──► staging    (porta 3010, DB db_gestao_staging)
# └─ main ──► production (porta 3000, DB db_gestao)

on:
  push:
    branches: [main, dev]

jobs:
  # ── 1. Testes ─────────────────────────────────────────────────
  test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     challenge_user
          POSTGRES_PASSWORD: challenge_pass
          POSTGRES_DB:       db_gestao_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U challenge_user -d db_gestao_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV:     test
      DATABASE_URL: postgresql://challenge_user:challenge_pass@localhost:5432/db_gestao_test?sslmode=disable

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Preparar banco de testes
        env:
          PGPASSWORD: challenge_pass
        run: |
          psql -h localhost -U challenge_user -d db_gestao_test -f tests/fixtures/schema.sql
          psql -h localhost -U challenge_user -d db_gestao_test -f tests/fixtures/data.sql
      - run: npm run test:unit
      - run: npm run test:integration
      - run: npm run test:security
      - run: npm run test:e2e

  # ── 2. Deploy ─────────────────────────────────────────────────
  deploy:
    name: Deploy → ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Resolver ambiente
        id: env
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "DEPLOY_ENV=production"              >> $GITHUB_OUTPUT
            echo "IMAGE_TAG=latest"                   >> $GITHUB_OUTPUT
            echo "COMPOSE_FILE=docker-compose.yml"    >> $GITHUB_OUTPUT
            echo "DB_NAME=db_gestao"                  >> $GITHUB_OUTPUT
            echo "FRONTEND_URL=https://apihub-macedo.duckdns.org"  >> $GITHUB_OUTPUT
            echo "FRONTEND_PORT=3001"                 >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_ENV=staging"                         >> $GITHUB_OUTPUT
            echo "IMAGE_TAG=staging"                          >> $GITHUB_OUTPUT
            echo "COMPOSE_FILE=docker-compose.staging.yml"    >> $GITHUB_OUTPUT
            echo "DB_NAME=db_gestao_staging"                  >> $GITHUB_OUTPUT
            echo "FRONTEND_URL=https://apihub-macedo.duckdns.org" >> $GITHUB_OUTPUT
            echo "FRONTEND_PORT=3011"                         >> $GITHUB_OUTPUT
          fi

      - name: Escrever .env na VPS e fazer deploy
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_ENV:    ${{ steps.env.outputs.DEPLOY_ENV }}
          IMAGE_TAG:     ${{ steps.env.outputs.IMAGE_TAG }}
          COMPOSE_FILE:  ${{ steps.env.outputs.COMPOSE_FILE }}
          DB_NAME:       ${{ steps.env.outputs.DB_NAME }}
          FRONTEND_URL:  ${{ steps.env.outputs.FRONTEND_URL }}
          FRONTEND_PORT: ${{ steps.env.outputs.FRONTEND_PORT }}
          POSTGRES_USER:      ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD:  ${{ secrets.POSTGRES_PASSWORD }}
          FB_API_KEY:                   ${{ secrets.FB_API_KEY }}
          FB_AUTH_DOMAIN:               ${{ secrets.FB_AUTH_DOMAIN }}
          FB_PROJECT_ID:                ${{ secrets.FB_PROJECT_ID }}
          FB_STORAGE_BUCKET:            ${{ secrets.FB_STORAGE_BUCKET }}
          FB_MESSAGING_SENDER_ID:       ${{ secrets.FB_MESSAGING_SENDER_ID }}
          FB_APP_ID:                    ${{ secrets.FB_APP_ID }}
          FB_MEASUREMENT_ID:            ${{ secrets.FB_MEASUREMENT_ID }}
          FIREBASE_ADMIN_PROJECT_ID:    ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          FIREBASE_ADMIN_CLIENT_EMAIL:  ${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}
          FIREBASE_ADMIN_PRIVATE_KEY:   ${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          port:     ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          envs: DEPLOY_ENV,IMAGE_TAG,COMPOSE_FILE,DB_NAME,FRONTEND_URL,FRONTEND_PORT,POSTGRES_USER,POSTGRES_PASSWORD,FB_API_KEY,FB_AUTH_DOMAIN,FB_PROJECT_ID,FB_STORAGE_BUCKET,FB_MESSAGING_SENDER_ID,FB_APP_ID,FB_MEASUREMENT_ID,FIREBASE_ADMIN_PROJECT_ID,FIREBASE_ADMIN_CLIENT_EMAIL,FIREBASE_ADMIN_PRIVATE_KEY
          script: |
            set -e
            DEPLOY_DIR="/home/admin/sql-challenge-backend"
            ENV_FILE="$DEPLOY_DIR/.env.${DEPLOY_ENV}"

            echo "=== Escrevendo $ENV_FILE ==="
            cat > "$ENV_FILE" << EOF
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=${DB_NAME}
            DB_PORT=5432
            PORT=3000
            NODE_ENV=production
            DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-staging:5432/${DB_NAME}?sslmode=disable
            apiKey=${FB_API_KEY}
            authDomain=${FB_AUTH_DOMAIN}
            projectId=${FB_PROJECT_ID}
            storageBucket=${FB_STORAGE_BUCKET}
            messagingSenderId=${FB_MESSAGING_SENDER_ID}
            appId=${FB_APP_ID}
            measurementId=${FB_MEASUREMENT_ID}
            FIREBASE_ADMIN_PROJECT_ID=${FIREBASE_ADMIN_PROJECT_ID}
            FIREBASE_ADMIN_CLIENT_EMAIL=${FIREBASE_ADMIN_CLIENT_EMAIL}
            FIREBASE_ADMIN_PRIVATE_KEY=${FIREBASE_ADMIN_PRIVATE_KEY}
            FRONTEND_URL=${FRONTEND_URL}
            FRONTEND_PORT=${FRONTEND_PORT}
            EOF
            chmod 600 "$ENV_FILE"

            echo "=== Deploy: env=$DEPLOY_ENV tag=$IMAGE_TAG ==="
            cd "$DEPLOY_DIR"
            git fetch origin
            git checkout ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}

            IMAGE_TAG=$IMAGE_TAG docker compose -f "$COMPOSE_FILE" up -d --build
            docker image prune -f
            echo "✅ Backend $DEPLOY_ENV deployado"

      - name: Notificar falha
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ CD ${{ steps.env.outputs.DEPLOY_ENV }} falhou — ${{ github.repository }}"
          to: ${{ secrets.MAIL_USERNAME }}
          from: SQL Challenge CD <${{ secrets.MAIL_USERNAME }}>
          body: |
            O pipeline de CD (backend) falhou.

            Ambiente    : ${{ steps.env.outputs.DEPLOY_ENV }}
            Repositório : ${{ github.repository }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}
            Autor       : ${{ github.actor }}

            Veja os detalhes em:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
